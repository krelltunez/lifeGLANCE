name: iOS build

# Verifies the iOS app still compiles after web or native changes. Build-only:
# no code signing, no device/simulator run, no upload — just a fast "does Xcode
# still accept the project" gate, since the iOS target has no other CI coverage.
#
# Runs on macOS (Xcode is macOS-only). Scoped to changes that can affect the
# iOS build so ordinary web-only PRs don't spend a macOS runner. First run may
# need the scheme name or Xcode version below nudged to match the CI image.

on:
  push:
    branches: ['**']
    paths:
      - 'ios/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'ios/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Capacitor 8's CLI requires Node >= 22 (npx cap sync fails on 20).
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS app (no signing)
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
